<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>급여월 가계부</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #e6ebf2;
      --text: #1f2937;
      --sub: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --danger: #dc2626;
      --good: #059669;
      --warn: #b45309;
      --chip: #eef4ff;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { touch-action: manipulation; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }
    .app {
      max-width: 440px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 118px;
    }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    .hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #2563eb 100%);
      color: #fff;
    }
    .hero .period-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .period-center {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 7px 10px;
      text-align: center;
      flex: 1;
      justify-content: center;
      min-height: 34px;
    }
    .hero-btn, .ghost-btn, .small-btn, .danger-btn, .primary-btn, .soft-btn, .fab {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
    }
    .hero-btn {
      width: 38px;
      height: 38px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 800;
    }
    .ghost-btn { padding: 8px 10px; background: #eef2ff; color: var(--primary-dark); }
    .soft-btn { padding: 8px 10px; background: #f3f4f6; color: var(--text); }
    .small-btn { padding: 8px 10px; background: #eff6ff; color: var(--primary-dark); }
    .danger-btn { padding: 8px 10px; background: #fee2e2; color: var(--danger); }
    .primary-btn { width: 100%; padding: 14px; background: var(--primary); color: #fff; font-weight: 800; }
    .title { font-size: 14px; opacity: 0.92; margin-bottom: 8px; }
    .money-lg { font-size: 34px; font-weight: 800; line-height: 1.15; margin-bottom: 10px; }
    .hero-meta, .grid-2, .report-grid, .inline-2, .fab-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .meta-box {
      background: rgba(255,255,255,0.12);
      padding: 12px;
      border-radius: 14px;
    }
    .meta-label { font-size: 12px; opacity: 0.85; }
    .meta-value { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-title { font-size: 17px; font-weight: 800; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: none; }
    .label { color: var(--sub); font-size: 14px; }
    .value { font-weight: 700; }
    .muted { color: var(--sub); font-size: 12px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      background: var(--chip);
      color: var(--primary-dark);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .budget-item { padding: 10px 0; border-bottom: 1px solid var(--line); }
    .budget-item:last-child { border-bottom: none; }
    .budget-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    .budget-bar {
      height: 8px;
      width: 100%;
      background: #edf2f7;
      border-radius: 999px;
      overflow: hidden;
    }
    .budget-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #2563eb);
      border-radius: 999px;
    }
    .fab {
      padding: 14px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      text-align: center;
      font-weight: 800;
    }
    .tabs {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      max-width: 440px;
      margin: 0 auto;
      z-index: 20;
      min-height: 84px;
    }
    .tab {
      padding: 16px 6px 18px;
      text-align: center;
      font-size: 13px;
      color: var(--sub);
      cursor: pointer;
      font-weight: 700;
      min-height: 84px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tab.active { color: var(--primary); font-weight: 800; }
    .list-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      margin-bottom: 10px;
    }
    .list-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }
    .item-title { font-weight: 800; }
    .item-desc { font-size: 12px; color: var(--sub); margin-top: 3px; }
    .badge {
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge.plan { background: #eef2ff; color: #3730a3; }
    .badge.card { background: #ecfeff; color: #0f766e; }
    .badge.actual { background: #ecfdf5; color: #166534; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .empty { text-align: center; color: var(--sub); padding: 24px 10px; font-size: 14px; }
    .asset-box, .sub-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .report-num { font-size: 22px; font-weight: 800; margin-top: 4px; }
    label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d7dce5;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
      margin-bottom: 12px;
      font-family: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 50;
    }
    .modal.show { display: flex; }
    .sheet {
      background: #fff;
      width: 100%;
      max-width: 440px;
      border-radius: 24px 24px 0 0;
      padding: 18px 16px 24px;
      max-height: 90vh;
      overflow: auto;
    }
    .sheet-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .sheet-title { font-size: 18px; font-weight: 800; }
    .help { font-size: 12px; color: var(--sub); margin-top: -8px; margin-bottom: 10px; }
    .danger { color: var(--danger); }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f3f4f6;
      color: var(--sub);
      font-size: 11px;
      font-weight: 700;
    }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .summary-mini {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      background: #fafcff;
    }
    .summary-mini .mini-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
    }
    .summary-mini .mini-value {
      font-size: 16px;
      font-weight: 800;
    }
    .row-inline-budget {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .row-inline-budget .budget-label {
      width: 110px;
      flex: 0 0 110px;
      font-size: 14px;
      color: var(--sub);
      font-weight: 700;
    }
    .row-inline-budget .budget-input {
      flex: 1;
    }
    .period-nav-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .period-nav-inline .period-label {
      flex: 1;
      text-align: center;
      background: #f3f6fb;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    button:disabled {
      opacity: 0.45;
      cursor: default;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="page active" id="page-home"></section>
    <section class="page" id="page-ledger"></section>
    <section class="page" id="page-assets"></section>
    <section class="page" id="page-reports"></section>
    <section class="page" id="page-settings"></section>
  </div>

  <nav class="tabs">
    <div class="tab active" data-page="home">홈</div>
    <div class="tab" data-page="ledger">내역</div>
    <div class="tab" data-page="assets">자산</div>
    <div class="tab" data-page="reports">리포트</div>
    <div class="tab" data-page="settings">설정</div>
  </nav>

  <div class="modal" id="modal">
    <div class="sheet">
      <div class="sheet-head">
        <div class="sheet-title" id="modalTitle">입력</div>
        <button class="ghost-btn" onclick="closeModal()">닫기</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <input type="file" id="importFileInput" accept="application/json" style="display:none;" />

  <script>
    const APP_KEY = 'salary-budget-master-v2';
    const LEGACY_KEYS = ['salary-budget-master-v1'];
    const APP_VERSION = '2.2.0';

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 9);
    }

    function pad(n) { return String(n).padStart(2, '0'); }
    function toInputDate(date) { return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`; }
    function fromInputDate(v) { return new Date(v + 'T00:00:00'); }
    function formatDate(d) { return `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`; }
    function formatMoney(value) { return `${Math.round(Number(value || 0)).toLocaleString('ko-KR')}원`; }
    function parseMoneyInput(v) { return Number(String(v || '').replace(/[^\d-]/g, '')) || 0; }
    function formatComma(v) { return v === '' ? '' : String(parseMoneyInput(v)).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
    function normalizeDateOnly(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function dateStr(d) { return toInputDate(normalizeDateOnly(d)); }
    function addDays(d, days) { const x = new Date(d); x.setDate(x.getDate() + days); return x; }
    function addMonths(d, months) { return new Date(d.getFullYear(), d.getMonth() + months, d.getDate()); }
    function assetKey(category, subcategory) { return `${category}__${subcategory || ''}`; }

    const CATEGORY_BASE = {
      '수입': {
        '월급': [],
        '수당': ['통계활동비', '정근수당', '명절수당', '출장비', '성과급'],
        '기타': ['용돈추가']
      },
      '저축/투자': {
        '현금': ['입출금통장', '예금', '적금', '비상금', '경조사'],
        '주식': ['ISA', '나무증권', '토스증권'],
        '금': [],
        '코인': ['비트코인', '이더리움', '기타'],
        '기타': ['연금저축', '주택청약', '보증금']
      },
      '고정지출': {
        '주거': ['대출이자', '관리비', '공과금'],
        '통신': ['휴대폰', '인터넷'],
        '보험': [],
        '구독': [],
        '기타': ['여행계', '가족계', '지역인재', '팀비']
      },
      '변동지출': {
        '식비': ['외식', '배달', '장보기', '구내식당', '기타'],
        '카페/간식': ['커피', '빵/디저트', '기타'],
        '쇼핑': ['의류', '신발', '잡화', '화장품', '기타'],
        '생활용품': [],
        '취미/여가': [],
        '모임/경조사': [],
        '미용': ['헤어', '뷰티', '기타'],
        '건강': [],
        '기타': []
      },
      '카드사용': {
        '식비': ['외식', '배달', '장보기', '구내식당', '기타'],
        '카페/간식': ['커피', '빵/디저트', '기타'],
        '쇼핑': ['의류', '신발', '잡화', '화장품', '기타'],
        '생활용품': [],
        '취미/여가': [],
        '모임/경조사': [],
        '미용': ['헤어', '뷰티', '기타'],
        '건강': [],
        '기타': []
      },
      '자산': {
        '현금': ['입출금통장', '예금', '적금', '비상금', '경조사'],
        '주식': ['ISA', '나무증권', '토스증권'],
        '금': [],
        '코인': ['비트코인', '이더리움', '기타'],
        '기타': ['연금저축', '주택청약', '보증금']
      },
      '부채': {
        '카드결제예정': [],
        '대출': [],
        '마이너스통장': [],
        '기타': []
      }
    };

    const RECURRING_DEFAULTS = [
      { type: '수입', category: '월급', subcategory: '', amount: 2750000, memo: '기본 월급', active: true },
      { type: '수입', category: '수당', subcategory: '통계활동비', amount: 100000, memo: '기본 반복', active: true },
      { type: '고정지출', category: '기타', subcategory: '여행계', amount: 80000, memo: '기본 반복', active: true },
      { type: '고정지출', category: '기타', subcategory: '가족계', amount: 50000, memo: '기본 반복', active: true },
      { type: '고정지출', category: '기타', subcategory: '지역인재', amount: 15000, memo: '기본 반복', active: true },
      { type: '고정지출', category: '기타', subcategory: '팀비', amount: 20000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '코인', subcategory: '비트코인', amount: 200000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '금', subcategory: '', amount: 200000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '주식', subcategory: 'ISA', amount: 500000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '기타', subcategory: '연금저축', amount: 100000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '기타', subcategory: '주택청약', amount: 50000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '현금', subcategory: '경조사', amount: 150000, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '현금', subcategory: '비상금', amount: 100000, memo: '기본 반복', active: true },
      { type: '고정지출', category: '보험', subcategory: '', amount: 15900, memo: '기본 반복', active: true },
      { type: '저축/투자', category: '주식', subcategory: '토스증권', amount: 200000, memo: '기본 반복', active: true }
    ];

    const KR_HOLIDAYS = {
      '2026-01-01': '신정',
      '2026-02-16': '설날 연휴',
      '2026-02-17': '설날',
      '2026-02-18': '설날 연휴',
      '2026-03-01': '삼일절',
      '2026-05-05': '어린이날',
      '2026-05-24': '부처님오신날',
      '2026-06-06': '현충일',
      '2026-08-15': '광복절',
      '2026-09-24': '추석 연휴',
      '2026-09-25': '추석',
      '2026-09-26': '추석 연휴',
      '2026-10-03': '개천절',
      '2026-10-09': '한글날',
      '2026-12-25': '성탄절'
    };

    const INVESTMENT_ASSET_KEYS = new Set([
      assetKey('주식', 'ISA'),
      assetKey('주식', '나무증권'),
      assetKey('주식', '토스증권'),
      assetKey('금', ''),
      assetKey('코인', '비트코인'),
      assetKey('코인', '이더리움'),
      assetKey('코인', '기타'),
      assetKey('기타', '연금저축')
    ]);

    const DEFAULT_STATE = {
      version: APP_VERSION,
      salaryDay: 25,
      monthOffset: 0,
      periods: {},
      items: [],
      assets: [],
      recurringRules: clone(RECURRING_DEFAULTS),
      fundLedgers: [],
      budgetSettings: {},
      customCategories: {},
      settings: {
        theme: 'light',
        latestSeenVersion: APP_VERSION
      }
    };

    function getCategoryTree(type) {
      if (state?.customCategories?.[type]) return state.customCategories[type];
      return clone(CATEGORY_BASE[type] || {});
    }

    function getEditableCategoryTypes() {
      return ['수입', '저축/투자', '고정지출', '변동지출', '카드사용', '부채'];
    }

    function isHoliday(date) {
      return Boolean(KR_HOLIDAYS[dateStr(date)]);
    }

    function adjustToPreviousBusinessDay(date) {
      let d = normalizeDateOnly(date);
      while (d.getDay() === 0 || d.getDay() === 6 || isHoliday(d)) {
        d = addDays(d, -1);
      }
      return d;
    }

    function getSalaryDateForMonth(year, monthIndex, salaryDay) {
      return adjustToPreviousBusinessDay(new Date(year, monthIndex, salaryDay));
    }

    function getCurrentBaseMonthOffset(salaryDay) {
      const now = new Date();
      const thisMonthSalary = getSalaryDateForMonth(now.getFullYear(), now.getMonth(), salaryDay);
      return normalizeDateOnly(now) >= normalizeDateOnly(thisMonthSalary) ? 0 : -1;
    }

    function getPeriodStartByOffset(offset, salaryDay) {
      const now = new Date();
      const baseMonth = getCurrentBaseMonthOffset(salaryDay) + offset;
      const target = addMonths(new Date(now.getFullYear(), now.getMonth(), 1), baseMonth);
      return getSalaryDateForMonth(target.getFullYear(), target.getMonth(), salaryDay);
    }

    function getPeriodKey(offset, salaryDay) {
      const start = getPeriodStartByOffset(offset, salaryDay);
      return `${start.getFullYear()}-${pad(start.getMonth() + 1)}`;
    }

    function getDefaultPeriodMeta(offset, salaryDay) {
      const start = getPeriodStartByOffset(offset, salaryDay);
      const nextStart = getPeriodStartByOffset(offset + 1, salaryDay);
      const end = addDays(nextStart, -1);
      return {
        title: `${start.getFullYear()}년 ${start.getMonth() + 1}월 급여월`,
        start: toInputDate(start),
        end: toInputDate(end)
      };
    }

    function seedAssets() {
      const list = [];
      Object.entries(CATEGORY_BASE['자산']).forEach(([category, subs]) => {
        if (subs.length) {
          subs.forEach(sub => list.push(createAssetRecord(category, sub)));
        } else {
          list.push(createAssetRecord(category, ''));
        }
      });
      return list;
    }

    function createAssetRecord(category, subcategory) {
      const key = assetKey(category, subcategory);
      const isInvestment = INVESTMENT_ASSET_KEYS.has(key);
      return {
        id: uid(),
        category,
        subcategory,
        currentAmount: 0,
        reserveAmount: 0,
        investedAmount: 0,
        editableAt: '2026-03-12',
        isInvestment,
        memo: ''
      };
    }

    function migrateState(raw) {
      const merged = clone(DEFAULT_STATE);
      merged.version = APP_VERSION;
      merged.salaryDay = Number(raw.salaryDay ?? 25);
      merged.monthOffset = Number(raw.monthOffset ?? 0);
      merged.periods = raw.periods || {};
      merged.items = Array.isArray(raw.items) ? raw.items.map(item => ({
        id: item.id || uid(),
        periodKey: item.periodKey || '',
        type: item.type || '',
        category: item.category || '',
        subcategory: item.subcategory || '',
        amount: Number(item.amount || 0),
        status: item.status || '계획',
        date: item.date || '',
        memo: item.memo || '',
        source: item.source || 'manual',
        linkedAssetKey: item.linkedAssetKey || '',
        linkedFundType: item.linkedFundType || '',
        createdAt: item.createdAt || new Date().toISOString()
      })) : [];
      merged.assets = Array.isArray(raw.assets) && raw.assets.length
        ? raw.assets.map(a => ({
            id: a.id || uid(),
            category: a.category || '',
            subcategory: a.subcategory || '',
            currentAmount: Number(a.currentAmount ?? a.amount ?? 0),
            reserveAmount: Number(a.reserveAmount || 0),
            investedAmount: Number(a.investedAmount || 0),
            editableAt: a.editableAt || '2026-03-12',
            isInvestment: typeof a.isInvestment === 'boolean'
              ? a.isInvestment
              : INVESTMENT_ASSET_KEYS.has(assetKey(a.category || '', a.subcategory || '')),
            memo: a.memo || ''
          }))
        : seedAssets();
      merged.recurringRules = Array.isArray(raw.recurringRules) && raw.recurringRules.length
        ? raw.recurringRules.map(rule => ({
            type: rule.type || '',
            category: rule.category || '',
            subcategory: rule.subcategory || '',
            amount: Number(rule.amount || 0),
            memo: rule.memo || '',
            active: rule.active !== false
          }))
        : clone(RECURRING_DEFAULTS);
      merged.fundLedgers = Array.isArray(raw.fundLedgers) ? raw.fundLedgers : [];
      merged.budgetSettings = raw.budgetSettings || {};
      merged.customCategories = raw.customCategories || {};
      merged.settings = {
        theme: raw.settings?.theme || 'light',
        latestSeenVersion: raw.settings?.latestSeenVersion || APP_VERSION
      };
      return merged;
    }

    function loadState() {
      let raw = localStorage.getItem(APP_KEY);
      if (!raw) {
        for (const legacy of LEGACY_KEYS) {
          const found = localStorage.getItem(legacy);
          if (found) { raw = found; break; }
        }
      }
      if (!raw) {
        const seeded = clone(DEFAULT_STATE);
        seeded.assets = seedAssets();
        const key = getPeriodKey(0, seeded.salaryDay);
        seeded.periods[key] = getDefaultPeriodMeta(0, seeded.salaryDay);
        return seeded;
      }
      try {
        return migrateState(JSON.parse(raw));
      } catch (e) {
        console.error(e);
        const seeded = clone(DEFAULT_STATE);
        seeded.assets = seedAssets();
        const key = getPeriodKey(0, seeded.salaryDay);
        seeded.periods[key] = getDefaultPeriodMeta(0, seeded.salaryDay);
        return seeded;
      }
    }

    let state = loadState();

    function saveState() {
      state.version = APP_VERSION;
      localStorage.setItem(APP_KEY, JSON.stringify(state));
    }

    function ensurePeriod(offset) {
      const key = getPeriodKey(offset, state.salaryDay);
      if (!state.periods[key]) {
        state.periods[key] = getDefaultPeriodMeta(offset, state.salaryDay);
        createRecurringItemsForPeriod(key, state.periods[key].start);
      }
      return { key, ...state.periods[key] };
    }

    function getCurrentPeriodMeta() {
      return ensurePeriod(state.monthOffset);
    }

    function getItemsByPeriod(periodKey) {
      return state.items.filter(item => item.periodKey === periodKey);
    }

    function sortByDateDesc(items) {
      return [...items].sort((a, b) => {
        const da = a.date || '0000-00-00';
        const db = b.date || '0000-00-00';
        if (da !== db) return db.localeCompare(da);
        return (b.createdAt || '').localeCompare(a.createdAt || '');
      });
    }

    function sumBy(items, fn) {
      return items.reduce((acc, cur) => acc + Number(fn(cur) || 0), 0);
    }

    function getPreviousPeriodKey(periodKey) {
      const [y, m] = periodKey.split('-').map(Number);
      const date = new Date(y, m - 2, 1);
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}`;
    }

    function getAssetRecord(category, subcategory) {
      const key = assetKey(category, subcategory);
      let asset = state.assets.find(a => assetKey(a.category, a.subcategory) === key);
      if (!asset) {
        asset = createAssetRecord(category, subcategory || '');
        state.assets.push(asset);
      }
      return asset;
    }

    function getAssetDisplayTotal(asset) {
      return asset.isInvestment
        ? Number(asset.reserveAmount || 0) + Number(asset.currentAmount || 0)
        : Number(asset.currentAmount || 0);
    }

    function getAssetTotal() {
      return sumBy(state.assets, getAssetDisplayTotal);
    }

    function getDebtTotal() {
      return sumBy(
        state.items.filter(i => i.type === '부채' && i.status === '현황'),
        i => i.amount
      ) + sumBy(
        state.items.filter(i => i.type === '카드사용' && i.status === '계획된지출'),
        i => i.amount
      );
    }

    function applySavingEffect(item, direction) {
      if (item.type !== '저축/투자' || item.status !== '현황') return;
      const asset = getAssetRecord(item.category, item.subcategory || '');
      const delta = Number(item.amount || 0) * direction;
      if (asset.isInvestment) {
        asset.reserveAmount += delta;
      } else {
        asset.currentAmount += delta;
      }
      asset.editableAt = item.date || toInputDate(new Date());
    }

    function createRecurringItemsForPeriod(periodKey, startDate) {
      const existing = getItemsByPeriod(periodKey).filter(i => i.source === 'recurring');
      if (existing.length) return;
      const previousKey = getPreviousPeriodKey(periodKey);
      const previousItems = getItemsByPeriod(previousKey);
      state.recurringRules.filter(r => r.active).forEach(rule => {
        const prev = previousItems.find(i =>
          i.source === 'recurring' &&
          i.type === rule.type &&
          i.category === rule.category &&
          (i.subcategory || '') === (rule.subcategory || '')
        );
        state.items.push({
          id: uid(),
          periodKey,
          type: rule.type,
          category: rule.category,
          subcategory: rule.subcategory || '',
          amount: Number(prev?.amount ?? rule.amount ?? 0),
          status: '계획',
          date: startDate,
          memo: prev?.memo || rule.memo || '반복 기본값',
          source: 'recurring',
          linkedAssetKey: '',
          linkedFundType: '',
          createdAt: new Date().toISOString()
        });
      });
    }

    function getRemainingDays(endStr) {
      const today = normalizeDateOnly(new Date());
      const end = fromInputDate(endStr);
      const diff = normalizeDateOnly(end) - today;
      return Math.max(1, Math.floor(diff / 86400000) + 1);
    }

    function getCategoryBudget(periodKey, category) {
      const explicit = Number(state.budgetSettings?.[periodKey]?.[category] || 0);
      if (explicit > 0) return explicit;
      return sumBy(
        getItemsByPeriod(periodKey).filter(i => i.type === '변동지출' && i.status === '계획' && i.category === category),
        i => i.amount
      );
    }

    function getCategorySpent(periodKey, category) {
      return sumBy(
        getItemsByPeriod(periodKey).filter(i =>
          i.category === category &&
          ['실제지출', '계획된지출'].includes(i.status)
        ),
        i => i.amount
      );
    }

    function computeSummary(periodKey) {
      const items = getItemsByPeriod(periodKey);

      const income = sumBy(items.filter(i => i.type === '수입' && i.status === '현황'), i => i.amount);
      const saving = sumBy(items.filter(i => i.type === '저축/투자' && i.status === '현황'), i => i.amount);
      const fixed = sumBy(items.filter(i => i.type === '고정지출' && i.status === '현황'), i => i.amount);

      const allowance = income - saving - fixed;

      const actualExpense = sumBy(items.filter(i => i.status === '실제지출'), i => i.amount);
      const plannedCardExpense = sumBy(items.filter(i => i.type === '카드사용' && i.status === '계획된지출'), i => i.amount);
      const plannedVariableExpense = sumBy(items.filter(i => i.type === '변동지출' && i.status === '계획'), i => i.amount);
      const plannedExpense = plannedCardExpense + plannedVariableExpense;

      const usedBudget = actualExpense + plannedCardExpense + plannedVariableExpense;
      const spare = allowance - usedBudget;
      const spendRate = allowance > 0 ? Math.min(100, Math.max(0, (usedBudget / allowance) * 100)) : 0;

      return {
        income,
        saving,
        fixed,
        allowance,
        actualExpense,
        plannedCardExpense,
        plannedVariableExpense,
        plannedExpense,
        usedBudget,
        spare,
        spendRate
      };
    }

    function topCategoryUsage(periodKey) {
      const budgetCategories = Object.keys(state.budgetSettings?.[periodKey] || {});
      const itemCategories = [...new Set(
        getItemsByPeriod(periodKey)
          .filter(i => ['변동지출', '카드사용'].includes(i.type))
          .map(i => i.category)
      )];
      const merged = [...new Set([...budgetCategories, ...itemCategories])];
      return merged
        .map(category => {
          const budget = getCategoryBudget(periodKey, category);
          const used = getCategorySpent(periodKey, category);
          const rate = budget > 0 ? (used / budget) * 100 : 0;
          return { category, budget, used, rate };
        })
        .filter(v => v.budget > 0 || v.used > 0)
        .sort((a, b) => b.used - a.used)
        .slice(0, 8);
    }

    function bindMoneyInputs(root = document) {
      root.querySelectorAll('[data-money="true"]').forEach(input => {
        if (input.dataset.moneyBound === 'true') return;
        input.dataset.moneyBound = 'true';
        const initialVal = input.value || input.dataset.raw || '';
        input.value = formatComma(initialVal);
        input.addEventListener('input', () => {
          const raw = parseMoneyInput(input.value);
          input.dataset.raw = raw ? String(raw) : '';
          input.value = raw ? formatComma(String(raw)) : '';
          input.setSelectionRange(input.value.length, input.value.length);
        });
        input.addEventListener('focus', () => {
          if (input.value) input.setSelectionRange(input.value.length, input.value.length);
        });
      });
    }

      const raw = value ? String(parseMoneyInput(value)) : '';
      return `<input id="${id}" data-money="true" data-raw="${raw}" value="${formatComma(raw)}" inputmode="numeric" placeholder="${placeholder}" />`;

    function bindCategorySelect(type, item = null) {

        actualType = document.getElementById('expenseMethod')?.value || item?.type || '변동지출';

      const tree = getCategoryTree(actualType);

      if (!cats.length) {

      categorySelect.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');

        const subs = tree[categorySelect.value] || [];
        subSelect.innerHTML = `<option value="">선택 안 함</option>` + subs.map(s => `<option value="${s}">${s}</option>`).join('');
      }

      categorySelect.onchange = updateSubs;
      categorySelect.value = item?.category && cats.includes(item.category) ? item.category : cats[0];
      updateSubs();
      if (item?.subcategory) subSelect.value = item.subcategory;
    }

      const sub = item.subcategory ? ` · ${item.subcategory}` : '';
      const actions = [];
      actions.push(`<button class="small-btn" onclick="openEditItem('${item.id}')">수정</button>`);

      if (item.status === '계획') {
        actions.push(`<button class="small-btn" onclick="openMoveConfirm('${item.id}')">확정</button>`);
      }

      if (item.type === '카드사용' && item.status === '계획된지출') {
        actions.push(`<button class="small-btn" onclick="openCardPay('${item.id}')">즉시결제</button>`);
      }

      if (item.type === '저축/투자' && item.category === '현금' && (item.subcategory === '비상금' || item.subcategory === '경조사') && item.status === '현황') {
        actions.push(`<button class="small-btn" onclick="openFundLedger('${item.subcategory}')">세부내역</button>`);
      }

      actions.push(`<button class="danger-btn" onclick="deleteItem('${item.id}')">삭제</button>`);

      return `
        <div class="list-card">
          <div class="list-top">
            <div>
              <div class="item-title">${item.type} · ${item.category}${sub}</div>
              <div class="item-desc">${item.memo || '메모 없음'} · ${item.date || ''}</div>
            </div>
            <div>
              <div class="badge ${badgeClass}">${badgeText}</div>
              <div class="value" style="margin-top:8px; text-align:right;">${formatMoney(item.amount)}</div>
            </div>
          </div>
          <div class="actions">${actions.join('')}</div>
        </div>
      `;
    }

    function renderLedger() {

      const planFixed = sumBy(plans.filter(i => i.type === '고정지출'), i => i.amount);

      document.getElementById('page-ledger').innerHTML = `

            <div class="summary-mini">

        ${buildLedgerSection('현황 · 변동지출', actualVariable, '변동지출 현황이 없어요.')}
        ${buildLedgerSection('현황 · 카드사용', actualCard, '카드사용 현황이 없어요.')}

    function renderReports() {
      const meta = getCurrentPeriodMeta();
      const summary = computeSummary(meta.key);
      const categoryMap = {};
      const subMap = {};

      getItemsByPeriod(meta.key).forEach(item => {
        if (!['변동지출', '카드사용'].includes(item.type)) return;
        if (!(item.status === '실제지출' || item.status === '계획된지출')) return;
        categoryMap[item.category] = (categoryMap[item.category] || 0) + Number(item.amount);
        const subKey = `${item.category} > ${item.subcategory || '기타'}`;
        subMap[subKey] = (subMap[subKey] || 0) + Number(item.amount);
      });

      const catRows = Object.entries(categoryMap).sort((a, b) => b[1] - a[1]);
      const subRows = Object.entries(subMap).sort((a, b) => {
        const [aCategory, aSub] = a[0].split(' > ');
        const [bCategory, bSub] = b[0].split(' > ');
        if (aCategory !== bCategory) return aCategory.localeCompare(bCategory, 'ko');
        return aSub.localeCompare(bSub, 'ko');
      });
      const budgetRows = topCategoryUsage(meta.key);

      document.getElementById('page-reports').innerHTML = `
        ${renderPeriodNavigator()}

        <div class="card">
          <div class="section-title">리포트</div>
          <div class="report-grid" style="margin-top:12px;">
            <div class="card" style="margin:0; box-shadow:none; border:1px solid var(--line);"><div class="label">실제 지출</div><div class="report-num">${formatMoney(summary.actualExpense)}</div></div>
            <div class="card" style="margin:0; box-shadow:none; border:1px solid var(--line);"><div class="label">카드값 + 계획 변동</div><div class="report-num">${formatMoney(summary.plannedExpense)}</div></div>
            <div class="card" style="margin:0; box-shadow:none; border:1px solid var(--line);"><div class="label">저축/투자</div><div class="report-num">${formatMoney(summary.saving)}</div></div>
            <div class="card" style="margin:0; box-shadow:none; border:1px solid var(--line);"><div class="label">예산 여유</div><div class="report-num">${formatMoney(summary.spare)}</div></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">지출 요약</div>
          <div class="row"><div class="label">실제 지출</div><div class="value">${formatMoney(summary.actualExpense)}</div></div>
          <div class="row"><div class="label">카드값</div><div class="value">${formatMoney(summary.plannedCardExpense)}</div></div>
          <div class="row"><div class="label">계획된 변동지출</div><div class="value">${formatMoney(summary.plannedVariableExpense)}</div></div>
          <div class="row"><div class="label">예산 내 여유 금액</div><div class="value">${formatMoney(summary.spare)}</div></div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">카테고리 예산 대비 사용</div>
            <button class="ghost-btn" onclick="openBudgetEditor()">예산 설정</button>
          </div>
          ${budgetRows.length ? budgetRows.map(row => `
            <div class="row">
              <div class="label">${row.category}<br><span class="muted">${formatMoney(row.used)} / ${formatMoney(row.budget)}</span></div>
              <div class="value">${row.budget > 0 ? row.rate.toFixed(0) + '%' : '-'}</div>
            </div>
          `).join('') : `<div class="empty">설정된 예산이 없어요.</div>`}
        </div>

        <div class="card">
          <div class="section-title">카테고리별 합계</div>
          ${catRows.length ? catRows.map(([k, v]) => `<div class="row"><div class="label">${k}</div><div class="value">${formatMoney(v)}</div></div>`).join('') : `<div class="empty">표시할 데이터가 없어요.</div>`}
        </div>

        <div class="card">
          <div class="section-title">하위 카테고리별 합계</div>
          ${subRows.length ? subRows.map(([k, v]) => `<div class="row"><div class="label">${k}</div><div class="value">${formatMoney(v)}</div></div>`).join('') : `<div class="empty">표시할 데이터가 없어요.</div>`}
        </div>
      `;
    }

      const current = getCurrentPeriodMeta();
      const start = document.getElementById('periodStart').value;
      const end = document.getElementById('periodEnd').value;
      state.periods[current.key] = {
        title: document.getElementById('periodTitle').value.trim() || current.title,

        end
      };

      closeModal();
      renderAll();

      const meta = getCurrentPeriodMeta();
      openModal(`${type} 추가`, buildItemForm(type, meta.key));
      bindCategorySelect(type);

      const meta = getCurrentPeriodMeta();
      openModal('지출 입력', buildItemForm('지출통합', meta.key));
      bindCategorySelect('지출통합');
    }

    function openAddDebt() {
      const meta = getCurrentPeriodMeta();
      openModal('부채 입력', buildItemForm('부채', meta.key));
      bindCategorySelect('부채');
    }

    function saveNewItem() {
      const formType = document.getElementById('itemType').value;
      const actualType = formType === '지출통합'
        ? (document.getElementById('expenseMethod')?.value || '변동지출')
        : formType;

      const item = {
        id: uid(),
        periodKey: document.getElementById('itemPeriodKey').value,
        type: actualType,
        category: document.getElementById('itemCategory').value,
        subcategory: document.getElementById('itemSubcategory').value,
        amount: getMoneyValue('itemAmount'),
        status: document.getElementById('itemStatus')?.value || (actualType === '부채' ? '현황' : '계획'),
        date: document.getElementById('itemDate').value,
        memo: document.getElementById('itemMemo').value.trim(),
        source: 'manual',
        linkedAssetKey: '',
        linkedFundType: '',
        createdAt: new Date().toISOString()
      };

      if (!item.amount) return alert('금액을 입력해주세요.');

      state.items.push(item);
      applySavingEffect(item, 1);
      saveState();
      closeModal();
      renderAll();

      item.memo = document.getElementById('moveMemo').value.trim();
      item.status = item.type === '변동지출' ? '실제지출' : '현황';

      saveState();
      closeModal();
      renderAll();

    function saveEditedItem() {
      const itemId = document.getElementById('editItemId').value;
      const item = state.items.find(i => i.id === itemId);
      if (!item) return;

      const oldItem = clone(item);

      const formType = document.getElementById('itemType').value;
      const actualType = formType === '지출통합'
        ? (document.getElementById('expenseMethod')?.value || '변동지출')
        : formType;

      item.type = actualType;
      item.category = document.getElementById('itemCategory').value;
      item.subcategory = document.getElementById('itemSubcategory').value;
      item.status = document.getElementById('itemStatus')?.value || item.status;

    function escapeId(value) {

    function saveBudgetSettings() {
      const meta = getCurrentPeriodMeta();
      const categories = Object.keys(getCategoryTree('변동지출'));
      if (!state.budgetSettings[meta.key]) state.budgetSettings[meta.key] = {};
      categories.forEach(category => {
        const value = getMoneyValue(`budget_${escapeId(category)}`);
        if (value > 0) state.budgetSettings[meta.key][category] = value;
        else delete state.budgetSettings[meta.key][category];
      });
      saveState();
      closeModal();
      renderAll();

    function escapeJs(str) {
      return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function isCategoryUsed(type, category, subcategory = null) {
      if (subcategory === null) {
        return state.items.some(i => i.type === type && i.category === category)
          || state.recurringRules.some(r => r.type === type && r.category === category);
      }
      return state.items.some(i => i.type === type && i.category === category && (i.subcategory || '') === subcategory)
        || state.recurringRules.some(r => r.type === type && r.category === category && (r.subcategory || '') === subcategory);
    }

    function getCustomTreeForEdit(type) {
      const current = state.customCategories[type] ? clone(state.customCategories[type]) : clone(CATEGORY_BASE[type] || {});
      return current;
    }

    function openCategoryManager(type = '변동지출') {
      openModal('카테고리 관리', buildCategoryManagerHtml(type));
    }

    function buildCategoryManagerHtml(type) {
      const tree = getCategoryTree(type);
      const entries = Object.entries(tree);

      return `
        <label>구분</label>
        <select id="categoryManageType" onchange="rerenderCategoryManager()">
          ${getEditableCategoryTypes().map(t => `<option value="${t}" ${t === type ? 'selected' : ''}>${t}</option>`).join('')}
        </select>

        <div class="actions" style="margin-bottom:10px;">
          <button class="small-btn" onclick="addMainCategory()">대분류 추가</button>
        </div>

        ${entries.map(([category, subs], idx) => `
          <div class="sub-card">
            <div class="section-head">
              <div class="item-title">${category}</div>
              <div class="actions" style="margin-top:0;">
                <button class="small-btn" onclick="moveMainCategory('${escapeJs(type)}','${escapeJs(category)}','up')" ${idx === 0 ? 'disabled' : ''}>↑</button>
                <button class="small-btn" onclick="moveMainCategory('${escapeJs(type)}','${escapeJs(category)}','down')" ${idx === entries.length - 1 ? 'disabled' : ''}>↓</button>
                <button class="small-btn" onclick="renameMainCategory('${escapeJs(type)}','${escapeJs(category)}')">이름변경</button>
                <button class="danger-btn" onclick="deleteMainCategory('${escapeJs(type)}','${escapeJs(category)}')">삭제</button>
              </div>
            </div>

            ${subs.length ? subs.map((sub, subIdx) => `
              <div class="row">
                <div class="label">${sub}</div>
                <div class="actions" style="margin-top:0;">
                  <button class="small-btn" onclick="moveSubCategory('${escapeJs(type)}','${escapeJs(category)}','${escapeJs(sub)}','up')" ${subIdx === 0 ? 'disabled' : ''}>↑</button>
                  <button class="small-btn" onclick="moveSubCategory('${escapeJs(type)}','${escapeJs(category)}','${escapeJs(sub)}','down')" ${subIdx === subs.length - 1 ? 'disabled' : ''}>↓</button>
                  <button class="small-btn" onclick="renameSubCategory('${escapeJs(type)}','${escapeJs(category)}','${escapeJs(sub)}')">이름변경</button>
                  <button class="danger-btn" onclick="deleteSubCategory('${escapeJs(type)}','${escapeJs(category)}','${escapeJs(sub)}')">삭제</button>
                </div>
              </div>
            `).join('') : `<div class="muted" style="margin-bottom:10px;">하위 카테고리 없음</div>`}

            <div class="actions">
              <button class="small-btn" onclick="addSubCategory('${escapeJs(type)}','${escapeJs(category)}')">하위 카테고리 추가</button>
            </div>
          </div>
        `).join('')}
      `;
    }

    function rerenderCategoryManager() {
      const type = document.getElementById('categoryManageType').value;
      document.getElementById('modalBody').innerHTML = buildCategoryManagerHtml(type);
    }

    function addMainCategory() {
      const type = document.getElementById('categoryManageType').value;
      const name = prompt('추가할 대분류 이름');
      if (!name) return;
      const tree = getCustomTreeForEdit(type);
      if (tree[name]) return alert('이미 있는 카테고리입니다.');
      tree[name] = [];
      state.customCategories[type] = tree;
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function renameMainCategory(type, oldName) {
      const newName = prompt('새 대분류 이름', oldName);
      if (!newName || newName === oldName) return;
      const tree = getCustomTreeForEdit(type);
      if (tree[newName]) return alert('이미 있는 이름입니다.');
      tree[newName] = tree[oldName] || [];
      delete tree[oldName];
      state.customCategories[type] = tree;

      state.items.forEach(item => {
        if (item.type === type && item.category === oldName) item.category = newName;
      });
      state.recurringRules.forEach(rule => {
        if (rule.type === type && rule.category === oldName) rule.category = newName;
      });

      if (type === '변동지출' && state.budgetSettings) {
        Object.keys(state.budgetSettings).forEach(periodKey => {
          if (state.budgetSettings[periodKey][oldName] != null) {
            state.budgetSettings[periodKey][newName] = state.budgetSettings[periodKey][oldName];
            delete state.budgetSettings[periodKey][oldName];
          }
        });
      }

      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function deleteMainCategory(type, category) {
      if (isCategoryUsed(type, category)) {
        return alert('이미 사용 중인 카테고리라 삭제할 수 없어요.');
      }
      if (!confirm(`"${category}" 카테고리를 삭제할까요?`)) return;
      const tree = getCustomTreeForEdit(type);
      delete tree[category];
      state.customCategories[type] = tree;
      if (type === '변동지출' && state.budgetSettings) {
        Object.keys(state.budgetSettings).forEach(periodKey => {
          delete state.budgetSettings[periodKey][category];
        });
      }
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function addSubCategory(type, category) {
      const name = prompt('추가할 하위 카테고리 이름');
      if (!name) return;
      const tree = getCustomTreeForEdit(type);
      tree[category] = tree[category] || [];
      if (tree[category].includes(name)) return alert('이미 있는 하위 카테고리입니다.');
      tree[category].push(name);
      state.customCategories[type] = tree;
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function renameSubCategory(type, category, oldName) {
      const newName = prompt('새 하위 카테고리 이름', oldName);
      if (!newName || newName === oldName) return;
      const tree = getCustomTreeForEdit(type);
      if ((tree[category] || []).includes(newName)) return alert('이미 있는 이름입니다.');
      tree[category] = (tree[category] || []).map(sub => sub === oldName ? newName : sub);
      state.customCategories[type] = tree;

      state.items.forEach(item => {
        if (item.type === type && item.category === category && (item.subcategory || '') === oldName) item.subcategory = newName;
      });
      state.recurringRules.forEach(rule => {
        if (rule.type === type && rule.category === category && (rule.subcategory || '') === oldName) rule.subcategory = newName;
      });

      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function deleteSubCategory(type, category, sub) {
      if (isCategoryUsed(type, category, sub)) {
        return alert('이미 사용 중인 하위 카테고리라 삭제할 수 없어요.');
      }
      if (!confirm(`"${sub}" 하위 카테고리를 삭제할까요?`)) return;
      const tree = getCustomTreeForEdit(type);
      tree[category] = (tree[category] || []).filter(v => v !== sub);
      state.customCategories[type] = tree;
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function moveMainCategory(type, category, direction) {
      const tree = getCustomTreeForEdit(type);
      const entries = Object.entries(tree);
      const idx = entries.findIndex(([key]) => key === category);
      if (idx < 0) return;

      const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (targetIdx < 0 || targetIdx >= entries.length) return;

      [entries[idx], entries[targetIdx]] = [entries[targetIdx], entries[idx]];
      state.customCategories[type] = Object.fromEntries(entries);
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function moveSubCategory(type, category, sub, direction) {
      const tree = getCustomTreeForEdit(type);
      const subs = [...(tree[category] || [])];
      const idx = subs.findIndex(v => v === sub);
      if (idx < 0) return;

      const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
      if (targetIdx < 0 || targetIdx >= subs.length) return;

      [subs[idx], subs[targetIdx]] = [subs[targetIdx], subs[idx]];
      tree[category] = subs;
      state.customCategories[type] = tree;
      saveState();
      rerenderCategoryManager();
      renderAll();
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        version: APP_VERSION,
        appKey: APP_KEY,
        data: state
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `salary-budget-backup-${toInputDate(new Date())}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function triggerImport() {
      document.getElementById('importFileInput').click();
    }

    async function handleImportFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const incoming = parsed.data || parsed;
        if (!incoming || typeof incoming !== 'object') {
          alert('올바른 백업 파일이 아니에요.');
          event.target.value = '';
          return;
        }
        if (!confirm('현재 데이터를 백업 파일 데이터로 교체할까요?')) {
          event.target.value = '';
          return;
        }
        state = migrateState(incoming);
        saveState();
        renderAll('home');
        alert('데이터를 가져왔어요.');
      } catch (e) {
        console.error(e);
        alert('가져오기에 실패했어요. JSON 파일인지 확인해주세요.');
      } finally {
        event.target.value = '';
      }
    }

    function saveSettings() {
      const salaryDay = Number(document.getElementById('salaryDayInput').value || 25);
      if (salaryDay < 1 || salaryDay > 28) return alert('월급일은 1~28일로 입력해주세요.');
      state.salaryDay = salaryDay;
      state.monthOffset = 0;
      const newPeriods = {};
      for (let i = -12; i <= 12; i++) {
        const key = getPeriodKey(i, state.salaryDay);
        newPeriods[key] = state.periods[key] || getDefaultPeriodMeta(i, state.salaryDay);
        createRecurringItemsForPeriod(key, newPeriods[key].start);
      }
      state.periods = newPeriods;
      saveState();
      renderAll();
      alert('설정이 저장되었습니다.');
    }

    function hardRefreshApp() {
      alert('1) 홈화면에 추가한 앱 삭제\n2) 브라우저에서 최신 주소 열기\n3) 새로고침 후 다시 홈 화면에 추가\n\n동일 기기라도 홈화면 앱은 이전 캐시를 들고 있을 수 있어요.');
    }

    function resetApp() {
      if (!confirm('모든 데이터를 초기화할까요?')) return;
      localStorage.removeItem(APP_KEY);
      LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
      state = loadState();
      renderAll();
    }

    function goPage(page) {
      renderTabs(page);
      renderAll(page);
    }

    function renderAll(activePage) {
      ensurePeriod(state.monthOffset);
      renderHome();
      renderLedger();
      renderAssets();
      renderReports();
      renderSettings();
      if (activePage) renderTabs(activePage);
      else {
        const activeTab = document.querySelector('.tab.active')?.dataset.page || 'home';
        renderTabs(activeTab);
      }
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => goPage(tab.dataset.page));
    });

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });

    document.getElementById('importFileInput').addEventListener('change', handleImportFile);

    for (let i = -2; i <= 3; i++) ensurePeriod(i);
    saveState();
    renderAll('home');
  </script>
</body>
</html>
